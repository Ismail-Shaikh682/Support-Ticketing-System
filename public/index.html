<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support CRM - Tickets</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Support Tickets</h1>
    
    <!-- Search & Filter Bar -->
    <div class="flex flex-col sm:flex-row gap-4 mb-6">
      <input type="text" id="searchInput" placeholder="Search tickets..." 
             class="w-full sm:w-1/2 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
      <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400">
        <option value="">All Statuses</option>
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Closed">Closed</option>
      </select>
      <a href="/create.html" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition self-start">
        + New Ticket
      </a>
    </div>

    <!-- Tickets Table -->
    <div class="overflow-x-auto bg-white rounded-xl shadow">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Subject</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
            <th class="px-6 py-3"></th>
          </tr>
        </thead>
        <tbody id="ticketTableBody" class="divide-y divide-gray-200">
          <!-- Rows loaded via JS -->
        </tbody>
      </table>
      <div id="noTickets" class="text-center py-8 text-gray-500 hidden">No tickets found.</div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    async function fetchTickets() {
      const search = document.getElementById('searchInput').value;
      const status = document.getElementById('statusFilter').value;
      const params = new URLSearchParams();
      if (status) params.append('status', status);
      if (search) params.append('search', search);

      const res = await fetch(`${API_BASE}/tickets?${params}`);
      const tickets = await res.json();
      renderTickets(tickets);
    }

    function renderTickets(tickets) {
      const tbody = document.getElementById('ticketTableBody');
      const noTickets = document.getElementById('noTickets');
      tbody.innerHTML = '';
      if (tickets.length === 0) {
        noTickets.classList.remove('hidden');
      } else {
        noTickets.classList.add('hidden');
        tickets.forEach(ticket => {
          const row = document.createElement('tr');
          row.className = 'hover:bg-gray-50';
          row.innerHTML = `
            <td class="px-6 py-4 text-sm font-mono text-blue-600">${ticket.ticket_id}</td>
            <td class="px-6 py-4 text-sm text-gray-700">${escapeHtml(ticket.customer_name)}</td>
            <td class="px-6 py-4 text-sm text-gray-700">${escapeHtml(ticket.subject)}</td>
            <td class="px-6 py-4 text-sm">
              <span class="px-2 py-1 text-xs font-semibold rounded-full ${statusColor(ticket.status)}">
                ${ticket.status}
              </span>
            </td>
            <td class="px-6 py-4 text-sm text-gray-500">${new Date(ticket.created_at).toLocaleDateString()}</td>
            <td class="px-6 py-4 text-sm">
              <a href="/ticket.html?ticket_id=${ticket.ticket_id}" class="text-blue-600 hover:underline">View</a>
            </td>
          `;
          tbody.appendChild(row);
        });
      }
    }

    function statusColor(status) {
      if (status === 'Open') return 'bg-yellow-100 text-yellow-800';
      if (status === 'In Progress') return 'bg-blue-100 text-blue-800';
      return 'bg-green-100 text-green-800';
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Live search as you type
    document.getElementById('searchInput').addEventListener('input', fetchTickets);
    document.getElementById('statusFilter').addEventListener('change', fetchTickets);

    // Initial load
    fetchTickets();
  </script>
</body>
</html>
